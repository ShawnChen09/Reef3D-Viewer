<!-- A template to display interactive 3d models on a web browser -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Viewer Template</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #FFFFFF; }
        model-viewer { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <!-- Replace [BASE64_STRING] with the actual model content OR
         replace the entire src with a permissive URL OR
         replace the entire src with a path and host locally 
         to access model without hitting CORS                         -->
    <!-- See https://modelviewer.dev/docs/ for customizing attributes -->
    <model-viewer
        src="data:application/octet-stream;base64,[BASE64_STRING]" 
        alt="Text description of the model" 
        auto-rotate 
        camera-controls>
    </model-viewer>
</body>
</html>
